<!DOCTYPE html>
<html>
<head>
    <title>Beautiful Web Page</title>
    <p>sharanya</p>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .card{
            background:white;
            width:350px;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        button{
            background:#667eea;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:25px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#764ba2;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome!</h1>
        <p>Create amazing websites with HTML, CSS, and creativity.</p>
        <button onclick="alert('Hello! Welcome to my webpage.')">
            Get Started
        </button>
    </div>

</body>
</html>
